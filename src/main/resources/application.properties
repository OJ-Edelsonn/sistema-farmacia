# Nombre de la aplicacion
spring.application.name=sistema-farmacia

# Conexion a MySQL usando XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/bd_farmacia?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuracion de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Formato SQL legible en consola
spring.jpa.properties.hibernate.format_sql=true
