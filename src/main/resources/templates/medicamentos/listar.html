<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Farmacia</a>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h3 mb-0">Medicamentos</h1>
            <a class="btn btn-success" th:href="@{/medicamentos/nuevo}">Nuevo</a>
        </div>

        <div class="alert alert-info" th:if="${mensaje}" th:text="${mensaje}"></div>

        <form class="row g-2 mb-3" th:action="@{/medicamentos/buscar}" method="get">
            <div class="col-md-10">
                <input type="text"
                       name="nombre"
                       class="form-control"
                       placeholder="Buscar por nombre"
                       th:value="${nombreBuscado}">
            </div>
            <div class="col-md-2 d-grid">
                <button type="submit" class="btn btn-primary">Buscar</button>
            </div>
        </form>

        <div class="table-responsive bg-white border rounded">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Laboratorio</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="medicamento : ${medicamentos}">
                        <td th:text="${medicamento.idMedicamento}"></td>
                        <td th:text="${medicamento.nombre}"></td>
                        <td th:text="${medicamento.laboratorio}"></td>
                        <td th:text="${medicamento.categoria}"></td>
                        <td th:text="${medicamento.precio}"></td>
                        <td th:text="${medicamento.stock}"></td>
                        <td th:text="${medicamento.estado}"></td>
                        <td class="text-center">
                            <a class="btn btn-info btn-sm"
                               th:href="@{/medicamentos/detalle/{id}(id=${medicamento.idMedicamento})}">
                                Ver detalle
                            </a>
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/medicamentos/editar/{id}(id=${medicamento.idMedicamento})}">
                                Editar
                            </a>
                            <a class="btn btn-danger btn-sm"
                               th:href="@{/medicamentos/eliminar/{id}(id=${medicamento.idMedicamento})}"
                               onclick="return confirm('¿Está seguro de eliminar este medicamento?');">
                                Eliminar
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(medicamentos)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No hay medicamentos registrados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a class="btn btn-secondary mt-3" th:href="@{/}">Volver</a>
    </main>
</body>
</html>
