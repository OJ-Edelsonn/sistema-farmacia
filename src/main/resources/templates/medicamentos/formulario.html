<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Formulario Medicamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Farmacia</a>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="bg-white border rounded p-4">
                    <h1 class="h3 mb-4" th:text="${titulo}">Formulario</h1>

                    <form th:action="@{/medicamentos/guardar}" th:object="${medicamento}" method="post">
                        <input type="hidden" th:field="*{idMedicamento}">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Laboratorio</label>
                            <input type="text" class="form-control" th:field="*{laboratorio}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" class="form-control" th:field="*{categoria}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{precio}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" min="0" class="form-control" th:field="*{stock}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha de vencimiento</label>
                            <input type="date" class="form-control" th:field="*{fechaVencimiento}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Estado</label>
                            <select class="form-select" th:field="*{estado}" required>
                                <option value="">Seleccione un estado</option>
                                <option value="Disponible">Disponible</option>
                                <option value="Agotado">Agotado</option>
                                <option value="Vencido">Vencido</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <a class="btn btn-secondary" th:href="@{/medicamentos}">Volver</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
