<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Medicamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Sistema de Farmacia</a>
        </div>
    </nav>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="bg-white border rounded p-4">
                    <h1 class="h3 mb-4">Detalle del Medicamento</h1>

                    <table class="table table-bordered">
                        <tr>
                            <th>ID</th>
                            <td th:text="${medicamento.idMedicamento}"></td>
                        </tr>
                        <tr>
                            <th>Nombre</th>
                            <td th:text="${medicamento.nombre}"></td>
                        </tr>
                        <tr>
                            <th>Laboratorio</th>
                            <td th:text="${medicamento.laboratorio}"></td>
                        </tr>
                        <tr>
                            <th>Categoría</th>
                            <td th:text="${medicamento.categoria}"></td>
                        </tr>
                        <tr>
                            <th>Precio</th>
                            <td th:text="${medicamento.precio}"></td>
                        </tr>
                        <tr>
                            <th>Stock</th>
                            <td th:text="${medicamento.stock}"></td>
                        </tr>
                        <tr>
                            <th>Fecha de vencimiento</th>
                            <td th:text="${medicamento.fechaVencimiento}"></td>
                        </tr>
                        <tr>
                            <th>Estado</th>
                            <td th:text="${medicamento.estado}"></td>
                        </tr>
                    </table>

                    <div class="d-flex gap-2">
                        <a class="btn btn-warning"
                           th:href="@{/medicamentos/editar/{id}(id=${medicamento.idMedicamento})}">
                            Editar
                        </a>
                        <a class="btn btn-secondary" th:href="@{/medicamentos}">Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
